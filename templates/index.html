<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container"></div>

<h2>Loan Approval Prediction</h2>

<form method="POST">

    <label>Gender:</label>
    <select name="Gender">
    	<option value="Male">Male</option>
    	<option value="Female">Female</option>
    </select><br><br>

    <label>Married:</label>
    <select name="Married">
        <option value="Yes">Yes</option>
        <option value="No">No</option>
    </select><br><br>

    <label>Dependents:</label>
    <select name="Dependents">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
    </select><br><br>

    <label>Education:</label>
    <select name="Education">
        <option value="Graduate">Graduate</option>
        <option value="Not Graduate">Not Graduate</option>
    </select><br><br>

    <label>Self Employed:</label>
    <select name="Self_Employed">
        <option value="No">No</option>
        <option value="Yes">Yes</option>
    </select><br><br>

    <label>Applicant Income:</label>
    <input type="number" name="ApplicantIncome"><br><br>

    <label>Coapplicant Income:</label>
    <input type="number" name="CoapplicantIncome"><br><br>

    <label>Loan Amount:</label>
    <input type="number" name="LoanAmount"><br><br>

    <label>Loan Amount Term:</label>
    <input type="number" name="Loan_Amount_Term"><br><br>

    <label>Credit History:</label>
    <select name="Credit_History">
        <option value="1">1</option>
        <option value="0">0</option>
    </select><br><br>

    <label>Property Area:</label>
    <select name="Property_Area">
        <option value="Urban">Urban</option>
        <option value="Semiurban">Semiurban</option>
        <option value="Rural">Rural</option>
    </select><br><br>

    <button type="submit">Predict</button>

</form>

{% if prediction %}
<h3>{{ prediction }}</h3>
{% endif %}

</body>
</html>
