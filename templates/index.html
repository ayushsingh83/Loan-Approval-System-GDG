<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Predictor</title>
</head>
<body>

<h2>Loan Approval Prediction</h2>

<form method="POST">

    <label>Gender:</label>
    <input type="text" name="Gender"><br><br>

    <label>Married:</label>
    <input type="text" name="Married"><br><br>

    <label>Dependents:</label>
    <input type="number" name="Dependents"><br><br>

    <label>Education:</label>
    <input type="text" name="Education"><br><br>

    <label>Self Employed:</label>
    <input type="text" name="Self_Employed"><br><br>

    <label>Applicant Income:</label>
    <input type="number" name="ApplicantIncome"><br><br>

    <label>Coapplicant Income:</label>
    <input type="number" name="CoapplicantIncome"><br><br>

    <label>Loan Amount:</label>
    <input type="number" name="LoanAmount"><br><br>

    <label>Loan Amount Term:</label>
    <input type="number" name="Loan_Amount_Term"><br><br>

    <label>Credit History:</label>
    <input type="number" name="Credit_History"><br><br>

    <label>Property Area:</label>
    <input type="text" name="Property_Area"><br><br>

    <button type="submit">Predict</button>

</form>

{% if prediction %}
<h3>{{ prediction }}</h3>
{% endif %}

</body>
</html>
